{% extends "snippets/base.html" %}

{% block content %}

<h1>副業タイプ診断</h1>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <p><label><input type="radio" name="answer" value="seller"> 商品販売や営業が得意</label></p>
    <p><label><input type="radio" name="answer" value="build"> 作ること・仕組み化が得意</label></p>
    <p><label><input type="radio" name="answer" value="influence"> 発信や影響力を伸ばしたい</label></p>
    <p><label><input type="radio" name="answer" value="stable"> 安定してコツコツ進めたい</label></p>

    <button type="submit">診断する</button>
</form>

{% endblock %}
