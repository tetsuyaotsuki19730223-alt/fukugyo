{% extends "base.html" %}

{% block content %}

<h1>副業タイプ診断</h1>

<form method="post">

{% csrf_token %}

<p>新しいことを試すのは好き？</p>

<input type="radio" name="q1" value="A"> YES
<input type="radio" name="q1" value="B"> NO

<p>AIに興味ある？</p>

<input type="radio" name="q2" value="A"> YES
<input type="radio" name="q2" value="B"> NO

<p>コツコツ作業は得意？</p>

<input type="radio" name="q3" value="A"> YES
<input type="radio" name="q3" value="B"> NO

<br><br>

<button type="submit" style="font-size:18px;padding:10px 20px">

診断する

</button>

</form>


{% if result %}

<hr>

<h2>あなたの副業タイプ</h2>

<h3>{{ result }}</h3>

<p>{{ description }}</p>

<p>
<a href="/diagnosis/">

AI副業ロードマップ作成

</a>
</p>
{% endif %}
<p>
<a href="https://twitter.com/intent/tweet?text=私の副業タイプは『{{ result }}』でした！%0A無料診断はこちら👇%0Ahttps://www.ai-sidejob-coach.net/type-diagnosis/" target="_blank">

<button style="font-size:18px;padding:10px 20px">

Xでシェアする

</button>

</a>
</p>
<p>
<a href="/diagnosis/share-image/?result={{ result }}" target="_blank">

<button style="font-size:18px;padding:10px 20px">

診断結果画像を作る

</button>

</a>

</p>
{% endblock %}
