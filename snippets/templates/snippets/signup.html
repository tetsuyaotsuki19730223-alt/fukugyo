{% extends "base.html" %}
{% block content %}

<h1>ユーザー登録</h1>

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="ユーザー名" value="{{ username|default:'' }}">

<input type="email" name="email" placeholder="メール">

<input type="password" name="password" placeholder="パスワード">

<button type="submit">登録</button>

</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

{% endblock %}
