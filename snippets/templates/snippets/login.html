{% extends "base.html" %}

{% block content %}

<h2>ログイン</h2>

<form method="post">
{% csrf_token %}

<p>
<label>ユーザー名</label><br>
<input type="text" name="username">
</p>

<p>
<label>パスワード</label><br>
<input type="password" name="password">
</p>

<button type="submit">ログイン</button>

</form>

<p>
アカウントが無い場合  
<a href="/signup/">新規登録</a>
</p>

{% endblock %}
