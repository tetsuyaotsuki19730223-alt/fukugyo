{% extends "snippets/base.html" %}

{% block content %}

<h1>🔥 今日の副業ミッション</h1>

<div style="background:#fff7e6;padding:20px;border-radius:10px;">

    <h2>{{ mission.title }}</h2>
    <p>{{ mission.description }}</p>
    <p>⭐ XP: {{ mission.xp }}</p>

    {% if user_mission.completed %}
        <p style="color:green;">✅ 完了済み</p>
    {% else %}
        <form method="post">
            {% csrf_token %}
            <button>ミッション完了</button>
        </form>
    {% endif %}

</div>

{% endblock %}
