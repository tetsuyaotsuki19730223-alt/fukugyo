{% extends "base.html" %}

{% block content %}

<h2>AI副業コーチ</h2>

<p>
AI残り回数<br>  
{{ request.user.profile.ai_count }}/3
</p>

<h3>AI副業コーチに相談</h3>

<p>よくある質問</p>

<button onclick="setQuestion('初心者におすすめの副業は？')">
初心者におすすめの副業
</button>

<button onclick="setQuestion('AIを使った副業は？')">
AI副業
</button>

<button onclick="setQuestion('月5万円稼ぐ副業は？')">
月5万円副業
</button>

<form method="POST">
{% csrf_token %}

<textarea id="question" name="question"></textarea>

<button type="submit">
AIに質問
</button>

<div style="white-space: pre-line;">
{{ answer }}
</div>

</form>

<script>
function setQuestion(text){
    document.getElementById("question").value = text;
}
</script>

{% endblock %}
