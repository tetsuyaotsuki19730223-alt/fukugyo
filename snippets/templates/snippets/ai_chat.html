{% extends "base.html" %}

{% block content %}

<h2>AI副業コーチ</h2>

<form method="post">
{% csrf_token %}

<input name="question" placeholder="副業について質問してください">

<button type="submit">質問する</button>

</form>

{% if answer %}

<h3>AI回答</h3>

<p style="white-space: pre-line;">
{{ answer }}
</p>

{% endif %}

{% endblock %}
