{% extends "snippets/base.html" %}

{% block content %}

<h1>AI副業コーチ</h1>

{% if is_premium %}
    <p style="color:gold;">👑 プレミアム会員</p>
{% else %}
    <p>残り {{ remaining }} 回</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <textarea name="question" id="question" style="width:100%;height:120px;">{{ question }}</textarea>
    <br><br>
    <button type="submit">AIに質問する</button>
</form>

{% if answer %}
    <div style="margin-top:20px; white-space: pre-line; line-height:1.8;">
        {{ answer }}
    </div>
{% endif %}

{% endblock %}
