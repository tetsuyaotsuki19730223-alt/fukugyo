{% extends "base.html" %}

{% block content %}

<h1>AI副業コミュニティ</h1>

<form method="post">
{% csrf_token %}
<textarea name="content"></textarea>
<button type="submit">投稿</button>
</form>

<hr>

{% for post in posts %}

<p>
<strong>{{ post.user.username }}</strong>
</p>

<p>
{{ post.content }}
</p>

<hr>

{% endfor %}


{% endblock %}
